<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Firewall</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="popup-wrapper">
  <div class="popup-card">

    <div class="homeicon" id="homeBtn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="#252628">
        <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/>
      </svg>
    </div>

    <h2>Redactron</h2>

    <div class="risk-status" id="riskStatus">
      Checking...
    </div>

    <!-- Only visible when BLOCK is detected -->
    <button id="redactBtn" style="display:none; margin-top:6px; padding:6px 16px; border-radius:12px; border:none; background:#252628; color:#ECAD81; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; cursor:pointer;">
      Redact &amp; Continue
    </button>

  </div>
</div>

<script src="popup.js"></script>

</body>
</html>
